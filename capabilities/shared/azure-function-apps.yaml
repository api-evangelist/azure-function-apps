naftiko: "1.0.0-alpha1"

info:
  label: "Azure Function Apps"
  description: "Azure Function Apps REST API for Azure resource management."
  tags:
    - Azure
    - Cloud
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AZURE_SUBSCRIPTION_ID: AZURE_SUBSCRIPTION_ID
      AZURE_ACCESS_TOKEN: AZURE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: azure-function-apps
      baseUri: https://management.azure.com
      description: "Azure Function Apps REST API"
      authentication:
        type: bearer
        token: "{{AZURE_ACCESS_TOKEN}}"
      resources:
        - name: function-app
          path: /subscriptions/{subscriptionId}/providers/Microsoft.FunctionApp/FunctionApps
          description: "Manage FunctionApp resources"
          operations:
            - name: list-function-apps
              method: GET
              description: "List all FunctionApp resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: function
          path: /subscriptions/{subscriptionId}/providers/Microsoft.Function/Functions
          description: "Manage Function resources"
          operations:
            - name: list-functions
              method: GET
              description: "List all Function resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: deployment
          path: /subscriptions/{subscriptionId}/providers/Microsoft.Deployment/Deployments
          description: "Manage Deployment resources"
          operations:
            - name: list-deployments
              method: GET
              description: "List all Deployment resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: configuration
          path: /subscriptions/{subscriptionId}/providers/Microsoft.Configuration/Configurations
          description: "Manage Configuration resources"
          operations:
            - name: list-configurations
              method: GET
              description: "List all Configuration resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8184
      namespace: azure-function-apps-api
      resources:
        - path: /v1/resources
          name: resources
          description: "Resource management"
          operations:
            - method: GET
              name: list-resources
              description: "List resources"
              call: "azure-function-apps.list-function-apps"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9184
      namespace: azure-function-apps-mcp
      transport: http
      tools:
        - name: list-function-apps
          description: "List FunctionApp resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-function-apps.list-function-apps"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-functions
          description: "List Function resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-function-apps.list-functions"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-deployments
          description: "List Deployment resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-function-apps.list-deployments"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-configurations
          description: "List Configuration resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-function-apps.list-configurations"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
