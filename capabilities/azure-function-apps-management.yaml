naftiko: "1.0.0-alpha1"

info:
  label: "Azure Function Apps Management"
  description: "Workflow capability for managing Azure Function Apps resources. Used by cloud engineers and DevOps teams."
  tags:
    - Azure
    - Cloud
    - Management
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AZURE_SUBSCRIPTION_ID: AZURE_SUBSCRIPTION_ID
      AZURE_ACCESS_TOKEN: AZURE_ACCESS_TOKEN

capability:
  consumes:
    - import: azure-function-apps
      location: ./shared/azure-function-apps.yaml

  exposes:
    - type: rest
      port: 8084
      namespace: azure-function-apps-management-api
      description: "Unified REST API for Azure Function Apps management."
      resources:
        - path: /v1/resources
          name: resources
          description: "Resource management"
          operations:
            - method: GET
              name: list
              description: "List all resources"
              call: "azure-function-apps.list-function-apps"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9094
      namespace: azure-function-apps-management-mcp
      transport: http
      description: "MCP server for AI-assisted Azure Function Apps management."
      tools:
        - name: list-function-apps
          description: "List FunctionApp resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-function-apps.list-function-apps"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-functions
          description: "List Function resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-function-apps.list-functions"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-deployments
          description: "List Deployment resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-function-apps.list-deployments"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-configurations
          description: "List Configuration resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-function-apps.list-configurations"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
