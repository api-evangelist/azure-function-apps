      path: /subscriptions/{subscriptionId}/providers/Microsoft.Web/sites
      operations:
      - name: webappslist
        method: GET
        description: Azure Function Apps Get All Apps for a Subscription.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
